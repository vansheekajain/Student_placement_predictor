<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎓 Student Placement Predictor</h1>
        <form action="/predict" method="POST">
            <label for="cgpa">Cumulative GPA (Max 10.0)</label>
            <input type="number" step="0.01" min="0" max="10" id="cgpa" name="cgpa" placeholder="e.g. 8.45" required>

            <label for="communication_skills">Communication Skills (0 - 10)</label>
            <input type="number" step="0.1" min="0" max="10" id="communication_skills" name="communication_skills" placeholder="e.g. 7.5" required>

            <label for="resume_score">Resume Rating (0 - 10)</label>
            <input type="number" step="0.1" min="0" max="10" id="resume_score" name="resume_score" placeholder="e.g. 8.0" required>

            <label for="coding_score">Coding Score (0 - 10)</label>
            <input type="number" step="0.1" min="0" max="10" id="coding_score" name="coding_score" placeholder="e.g. 9.2" required>

            <label for="attendance_placement">Placement Attendance (%)</label>
            <input type="number" step="0.1" min="0" max="100" id="attendance_placement" name="attendance_placement" placeholder="e.g. 85.0" required>

            <button type="submit" class="btn">Predict Status</button>
        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
